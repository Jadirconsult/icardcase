<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Icardcase — Tecnologia que conecta. Soluções que transformam.">
  <title>Icardcase — Tecnologia que conecta. Soluções que transformam.</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040E24"/>
      <stop offset="50%" stop-color="#081F4D"/>
      <stop offset="100%" stop-color="#0D2858"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#040E24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#2563EB" opacity="0.18"/>
    </pattern>
    <filter id="nodeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dots pattern com mask -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow lateral direito -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Constellation à direita -->
  <g transform="translate(820, 110)" opacity="0.55">
    <g stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.4" fill="none">
      <line x1="40" y1="60" x2="140" y2="20"/>
      <line x1="140" y1="20" x2="240" y2="80"/>
      <line x1="240" y1="80" x2="280" y2="200"/>
      <line x1="280" y1="200" x2="180" y2="280"/>
      <line x1="180" y1="280" x2="60" y2="240"/>
      <line x1="60" y1="240" x2="40" y2="60"/>
      <line x1="40" y1="60" x2="160" y2="140"/>
      <line x1="240" y1="80" x2="160" y2="140"/>
      <line x1="280" y1="200" x2="160" y2="140"/>
      <line x1="180" y1="280" x2="160" y2="140"/>
    </g>
    <g fill="#2563EB" filter="url(#nodeGlow)">
      <circle cx="40" cy="60" r="6"/>
      <circle cx="140" cy="20" r="5"/>
      <circle cx="240" cy="80" r="7"/>
      <circle cx="280" cy="200" r="5"/>
      <circle cx="180" cy="280" r="5.5"/>
      <circle cx="60" cy="240" r="4.5"/>
      <circle cx="160" cy="140" r="8"/>
    </g>
    <g fill="#FFFFFF">
      <circle cx="40" cy="60" r="2.4"/>
      <circle cx="140" cy="20" r="2"/>
      <circle cx="240" cy="80" r="2.8"/>
      <circle cx="280" cy="200" r="2"/>
      <circle cx="180" cy="280" r="2.2"/>
      <circle cx="60" cy="240" r="1.8"/>
      <circle cx="160" cy="140" r="3.2"/>
    </g>
  </g>

  <!-- Logo + texto à esquerda -->
  <g transform="translate(80, 120)">
    <!-- Mark (escala 0.6 do icon 256) -->
    <g transform="scale(0.55)">
      <g fill="#FFFFFF">
        <circle cx="80" cy="64" r="18"/>
        <rect x="62" y="96" width="36" height="100" rx="18" ry="18"/>
      </g>
      <g stroke="#2563EB" stroke-width="6" stroke-linecap="round" fill="none">
        <line x1="106" y1="118" x2="148" y2="98"/>
        <line x1="106" y1="146" x2="148" y2="146"/>
        <line x1="106" y1="176" x2="148" y2="196"/>
      </g>
      <g fill="#FFFFFF">
        <circle cx="170" cy="90" r="14"/>
        <circle cx="170" cy="146" r="14"/>
        <circle cx="170" cy="204" r="14"/>
      </g>
      <g fill="none" stroke="#2563EB" stroke-width="3">
        <circle cx="170" cy="90" r="6"/>
        <circle cx="170" cy="146" r="6"/>
        <circle cx="170" cy="204" r="6"/>
      </g>
    </g>
    <!-- Wordmark "icardcase" -->
    <text x="160" y="100" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="600" fill="#FFFFFF" letter-spacing="-2">icardcase</text>
  </g>

  <!-- Eyebrow técnico -->
  <text x="80" y="320" font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" font-size="18" font-weight="500" fill="#94A3B8" letter-spacing="2">
    BOUTIQUE DE TECNOLOGIA · EST. 2011
  </text>

  <!-- Headline display -->
  <text x="80" y="400" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="600" fill="#F8FAFC" letter-spacing="-3">Tecnologia que conecta.</text>
  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="600" fill="#D6DDE8" letter-spacing="-3">Soluções que transformam.</text>

  <!-- URL + label rodapé -->
  <line x1="80" y1="540" x2="200" y2="540" stroke="#1E3168" stroke-width="1"/>
  <text x="80" y="580" font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" font-size="20" font-weight="500" fill="#2563EB" letter-spacing="2">
    icardcase.com.br
  </text>
</svg>
