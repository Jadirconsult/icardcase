<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Icardcase">
  <title>Icardcase</title>
  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Letra "i" — versão com cor configurável via currentColor -->
  <g fill="currentColor">
    <circle cx="80" cy="64" r="18"/>
    <rect x="62" y="96" width="36" height="100" rx="18" ry="18"/>
  </g>

  <!-- Circuito: linhas em azul accent -->
  <g stroke="#2563EB" stroke-width="6" stroke-linecap="round" fill="none">
    <line x1="106" y1="118" x2="148" y2="98"/>
    <line x1="106" y1="146" x2="148" y2="146"/>
    <line x1="106" y1="176" x2="148" y2="196"/>
  </g>

  <!-- Nós: círculo claro com anel accent -->
  <g>
    <circle cx="170" cy="90" r="14" fill="currentColor" filter="url(#softGlow)"/>
    <circle cx="170" cy="146" r="14" fill="currentColor" filter="url(#softGlow)"/>
    <circle cx="170" cy="204" r="14" fill="currentColor" filter="url(#softGlow)"/>
    <circle cx="170" cy="90" r="6" fill="none" stroke="#2563EB" stroke-width="3"/>
    <circle cx="170" cy="146" r="6" fill="none" stroke="#2563EB" stroke-width="3"/>
    <circle cx="170" cy="204" r="6" fill="none" stroke="#2563EB" stroke-width="3"/>
  </g>
</svg>
