<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Icardcase">
  <title>Icardcase</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1F4D"/>
      <stop offset="55%" stop-color="#0F2C66"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Fundo quadrado com cantos arredondados -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Highlight sutil no topo (efeito 3D) -->
  <rect width="256" height="64" rx="52" ry="52" fill="white" opacity="0.04"/>

  <!-- Letra "i" estilizada — cabeça (círculo) + corpo (retangular arredondado) -->
  <g fill="#FFFFFF">
    <circle cx="80" cy="64" r="18"/>
    <rect x="62" y="96" width="36" height="100" rx="18" ry="18"/>
  </g>

  <!-- Circuito: linhas de conexão (azul accent) -->
  <g stroke="#2563EB" stroke-width="6" stroke-linecap="round" fill="none">
    <line x1="106" y1="118" x2="148" y2="98"/>
    <line x1="106" y1="146" x2="148" y2="146"/>
    <line x1="106" y1="176" x2="148" y2="196"/>
  </g>

  <!-- Circuito: 3 nós (círculos brancos com leve glow) -->
  <g fill="#FFFFFF" filter="url(#softGlow)">
    <circle cx="170" cy="90" r="14"/>
    <circle cx="170" cy="146" r="14"/>
    <circle cx="170" cy="204" r="14"/>
  </g>

  <!-- Anel interno azul accent nos nós (detalhe) -->
  <g fill="none" stroke="#2563EB" stroke-width="3">
    <circle cx="170" cy="90" r="6"/>
    <circle cx="170" cy="146" r="6"/>
    <circle cx="170" cy="204" r="6"/>
  </g>
</svg>
